name: lexii
description: "Lexii - TOEIC Learning App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^1.2.0+3

  # Local Storage
  shared_preferences: ^2.3.5

  # Audio
  just_audio: ^0.9.43
  record: ^6.2.0
  google_generative_ai: ^0.4.6

  # Architecture
  dartz: ^0.10.1
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  app_links: ^6.4.1
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "lexii.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/anh-cho.jpg

flutter_native_splash:
  color: "#F5F5F5"
  image: assets/images/anh-cho.jpg

  android_12:
    image: assets/images/anh-cho.jpg
    color: "#F5F5F5"
