<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TOEIC Official Score Certificate</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6eafa4", // Teal
                        "secondary": "#e69c5e", // Orange accent for the certificate feel
                        "background-light": "#f6f7f7",
                        "background-dark": "#161c1b",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center">
<!-- Mobile Container -->
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl">
<!-- App Bar -->
<div class="flex items-center bg-primary p-4 pt-10 pb-4 justify-between sticky top-0 z-10 shadow-sm">
<button class="text-white hover:bg-white/10 rounded-full p-2 transition-colors flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Kết quả</h2>
</div>
<!-- Main Content Scrollable Area -->
<div class="flex-1 overflow-y-auto p-4 pb-24">
<!-- Certificate Card -->
<div class="bg-white dark:bg-zinc-800 rounded-xl shadow-lg border-2 border-secondary/30 overflow-hidden relative">
<!-- Decorative background pattern for certificate -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] dark:opacity-[0.05]" style="background-image: radial-gradient(#6eafa4 1px, transparent 1px); background-size: 20px 20px;">
</div>
<!-- Header: Orange curved top section -->
<div class="bg-secondary p-4 relative overflow-hidden">
<div class="absolute -bottom-6 -left-6 w-24 h-24 bg-white/20 rounded-full blur-xl"></div>
<div class="absolute -top-6 -right-6 w-32 h-32 bg-white/20 rounded-full blur-xl"></div>
<h2 class="text-white tracking-wide text-center text-sm font-bold uppercase leading-tight drop-shadow-sm">
                        Listening and Reading<br/><span class="text-lg">Official Score Certificate</span>
</h2>
</div>
<!-- Info Section -->
<div class="p-5 grid grid-cols-2 gap-x-4 gap-y-3 relative z-10">
<div class="flex flex-col gap-1 border-b border-dashed border-gray-200 dark:border-zinc-700 pb-2">
<p class="text-gray-500 dark:text-gray-400 text-xs font-medium uppercase tracking-wider">Name</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold truncate">Lê Doãn Hiếu</p>
</div>
<div class="flex flex-col gap-1 border-b border-dashed border-gray-200 dark:border-zinc-700 pb-2 text-right">
<p class="text-gray-500 dark:text-gray-400 text-xs font-medium uppercase tracking-wider">Test Date</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">28/02/2026</p>
</div>
<div class="flex flex-col gap-1 border-b border-dashed border-gray-200 dark:border-zinc-700 pb-2">
<p class="text-gray-500 dark:text-gray-400 text-xs font-medium uppercase tracking-wider">DOB</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">01/01/2000</p>
</div>
<div class="flex flex-col gap-1 border-b border-dashed border-gray-200 dark:border-zinc-700 pb-2 text-right">
<p class="text-gray-500 dark:text-gray-400 text-xs font-medium uppercase tracking-wider">ID</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">12345678</p>
</div>
</div>
<!-- Scores Container -->
<div class="px-5 pb-6 flex flex-col gap-6">
<!-- Row for Listening & Reading Bars -->
<div class="flex flex-col gap-5">
<!-- Listening -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-secondary font-bold text-xs bg-secondary/10 px-2 py-0.5 rounded uppercase tracking-wider">Listening</span>
<span class="text-slate-900 dark:text-slate-100 font-bold text-lg">5 <span class="text-xs text-gray-400 font-normal">/ 495</span></span>
</div>
<div class="h-3 w-full bg-gray-100 dark:bg-zinc-700 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-gradient-to-r from-secondary/60 to-secondary w-[1%] rounded-full"></div>
</div>
</div>
<!-- Reading -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-secondary font-bold text-xs bg-secondary/10 px-2 py-0.5 rounded uppercase tracking-wider">Reading</span>
<span class="text-slate-900 dark:text-slate-100 font-bold text-lg">5 <span class="text-xs text-gray-400 font-normal">/ 495</span></span>
</div>
<div class="h-3 w-full bg-gray-100 dark:bg-zinc-700 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-gradient-to-r from-secondary/60 to-secondary w-[1%] rounded-full"></div>
</div>
</div>
</div>
<!-- Total Score Section -->
<div class="mt-2 pt-4 border-t border-gray-100 dark:border-zinc-700 flex justify-between items-center">
<div class="flex flex-col">
<span class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-widest font-semibold mb-1">Total Score</span>
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-sm">verified</span>
<span class="text-xs font-medium">Official Certified</span>
</div>
</div>
<!-- Stamped Style Circle -->
<div class="relative size-20 flex items-center justify-center">
<!-- Stamp border effect -->
<div class="absolute inset-0 rounded-full border-4 border-double border-secondary opacity-30 transform -rotate-12 scale-110"></div>
<div class="absolute inset-0 rounded-full border-2 border-dashed border-secondary opacity-50 transform rotate-45"></div>
<div class="z-10 bg-secondary text-white rounded-full size-16 flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-transform duration-300">
<span class="text-2xl font-black tracking-tighter">10</span>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Share -->
<button class="w-full mt-6 flex items-center justify-center gap-2 text-gray-500 dark:text-gray-400 hover:text-primary transition-colors py-2">
<span class="material-symbols-outlined text-lg">share</span>
<span class="text-sm font-medium">Chia sẻ kết quả với bạn bè</span>
</button>
</div>
<!-- Sticky Bottom Actions -->
<div class="fixed bottom-0 w-full max-w-md bg-white dark:bg-background-dark border-t border-gray-200 dark:border-zinc-800 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
<div class="flex gap-3">
<button class="flex-1 bg-white dark:bg-zinc-800 text-primary border border-primary hover:bg-primary/5 active:bg-primary/10 rounded-lg py-3 px-4 text-sm font-bold transition-all shadow-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">visibility</span>
                    Hiển thị đáp án
                </button>
<button class="flex-1 bg-primary text-white hover:bg-primary/90 active:bg-primary/80 rounded-lg py-3 px-4 text-sm font-bold transition-all shadow-md shadow-primary/30 flex items-center justify-center gap-2">
                    Tiếp tục
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
</div>
</body></html>
